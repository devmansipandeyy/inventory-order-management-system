# Render Blueprint — provisions a free Postgres + the backend as a Docker web service.
# Deploy: Render Dashboard → New → Blueprint → connect this repo → set OPENAI_API_KEY.
services:
  - type: web
    name: inventory-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # set this in the Render dashboard (secret)
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_ON_STARTUP
        value: "true"

databases:
  - name: inventory-db
    plan: free
