services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inv
      POSTGRES_PASSWORD: inv
      POSTGRES_DB: inventory
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inv -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://inv:inv@db:5432/inventory
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      SEED_ON_STARTUP: "true"
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static build. For a remote deploy, point this at the
        # public backend URL instead.
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
